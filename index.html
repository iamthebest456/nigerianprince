<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tiger Jungle Arcade 🐅</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* 🐅 HEADER */
header {
  padding: 20px 10px;
  text-align: center;
  background: radial-gradient(circle at center, #1a1a1a, #000);
  border-bottom: 3px solid #ff9900;
}

.logo {
  font-size: 34px;
  font-weight: 900;
  letter-spacing: 3px;

  background: linear-gradient(45deg, #ff9900, #ffcc00, #ff6600);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow: 
    0 0 10px rgba(255,150,0,0.6),
    0 0 20px rgba(255,120,0,0.4);
}

.tagline {
  font-size: 14px;
  color: #ffcc66;
  margin-top: 5px;
  opacity: 0.8;
  letter-spacing: 1px;
}

/* 🐾 CATEGORY TABS */
#categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.category {
  padding: 10px 15px;
  background: #1a1a1a;
  border: 2px solid #ff9900;
  border-radius: 20px 5px 20px 5px;
  cursor: pointer;
  white-space: nowrap;
  transition: 0.2s;
}

.category:hover {
  background: #ff9900;
  color: black;
}

/* GAME GRID */
#games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* GAME CARDS */
.game-card {
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid #ff9900;
  transition: transform 0.2s, box-shadow 0.2s;
}

.game-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #ff9900;
}

.game-card img {
  width: 100%;
}

.game-title {
  padding: 10px;
  text-align: center;
  color: #ffcc66;
}

/* BUTTON */
#loadMore {
  display: block;
  margin: 25px auto;
  padding: 12px 25px;
  font-weight: bold;
  color: black;
  background: linear-gradient(45deg, #ff9900, #ffcc00);
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#loadMore:hover {
  transform: scale(1.05);
}

/* PLAYER */
#player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
}

#closeBtn {
  background: #ff3300;
  border: none;
  color: white;
  padding: 12px;
  cursor: pointer;
}

iframe {
  flex: 1;
  border: none;
}

#info {
  padding: 10px;
  background: #111;
  color: #ffcc66;
}
</style>
</head>

<body>

<!-- 🐅 HEADER -->
<header>
  <div class="logo">🐅 TIGER JUNGLE ARCADE 🐅</div>
  <div class="tagline">Enter the Wild • Play the Best Games</div>
</header>

<!-- 🐾 CATEGORY TABS -->
<div id="categories">
  <div class="category" onclick="setCategory('')">All</div>
  <div class="category" onclick="setCategory('action')">Action</div>
  <div class="category" onclick="setCategory('arcade')">Arcade</div>
  <div class="category" onclick="setCategory('puzzle')">Puzzle</div>
  <div class="category" onclick="setCategory('kids')">Kids</div>
  <div class="category" onclick="setCategory('racing')">Racing</div>
</div>

<!-- GAME GRID -->
<div id="games"></div>
<button id="loadMore">🐾 Load More Games</button>

<!-- PLAYER -->
<div id="player">
  <button id="closeBtn">❌ Exit Jungle</button>
  <iframe id="gameFrame"></iframe>
  <div id="info">Score: 0 | Level: 0</div>
</div>

<!-- 🔊 YOUR LOCAL AUDIO FILES -->
<audio id="roar" src="dffdv-tiger-roar-loudly-193229.mp3" preload="auto"></audio>
<audio id="jungle" src="sounds/jungle-ambience.mp3" loop preload="auto"></audio>

<script>
const sid = "1";
let currentPage = 1;
let currentCategory = "";
const perPage = 24;

const gamesContainer = document.getElementById("games");
const iframe = document.getElementById("gameFrame");
const player = document.getElementById("player");
const info = document.getElementById("info");

const roar = document.getElementById("roar");
const jungle = document.getElementById("jungle");

let score = 0;
let level = 0;

/* 🔊 SOUND SETTINGS */
jungle.volume = 0.3;
roar.volume = 0.8;

/**
 * Start jungle sound after first click
 */
document.body.addEventListener("click", () => {
  jungle.play().catch(()=>{});
}, { once: true });

/**
 * Load games
 */
async function loadGames(reset = false) {
  if (reset) {
    gamesContainer.innerHTML = "";
    currentPage = 1;
  }

  let url = `https://feeds.gamepix.com/v2/json?order=quality&page=${currentPage}&pagination=${perPage}&sid=${sid}`;
  
  if (currentCategory) {
    url += `&category=${currentCategory}`;
  }

  try {
    const res = await fetch(url);
    const data = await res.json();

    data.items.forEach(game => {
      const card = document.createElement("div");
      card.className = "game-card";

      card.innerHTML = `
        <img src="${game.banner_image}">
        <div class="game-title">${game.title}</div>
      `;

      card.onclick = () => openGame(game.url);

      gamesContainer.appendChild(card);
    });

    currentPage++;
  } catch (err) {
    console.error(err);
  }
}

/**
 * Category switch
 */
function setCategory(cat) {
  currentCategory = cat;
  loadGames(true);
}

/**
 * Open game + 🐅 ROAR
 */
function openGame(url) {
  roar.currentTime = 0;
  roar.play().catch(()=>{});

  iframe.src = url;
  player.style.display = "flex";

  score = 0;
  level = 0;
  updateInfo();
}

/**
 * Close game
 */
document.getElementById("closeBtn").onclick = () => {
  iframe.src = "";
  player.style.display = "none";
};

/**
 * Update UI
 */
function updateInfo() {
  info.innerText = `Score: ${score} | Level: ${level}`;
}

/**
 * Game events
 */
window.addEventListener("message", (e) => {
  if (!e.data) return;

  if (e.data.type === "update_score") {
    score = e.data.score;
  }

  if (e.data.type === "update_level") {
    level = e.data.level;
  }

  updateInfo();
});

/**
 * Load more
 */
document.getElementById("loadMore").onclick = () => loadGames();

/**
 * Init
 */
loadGames();
</script>

</body>
</html>
