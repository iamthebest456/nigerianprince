<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamepix Full Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #1e293b;
  font-size: 24px;
}

#games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

.game-card {
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.game-card img {
  width: 100%;
}

.game-title {
  padding: 10px;
  text-align: center;
}

#loadMore {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  color: white;
  font-size: 16px;
}

#player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
}

iframe {
  flex: 1;
  border: none;
}

#closeBtn {
  background: red;
  border: none;
  color: white;
  padding: 10px;
  cursor: pointer;
}

#info {
  padding: 10px;
  background: #111;
}
</style>
</head>

<body>

<header>🎮 Gamepix Infinite Arcade</header>

<div id="games"></div>
<button id="loadMore">Load More Games</button>

<div id="player">
  <button id="closeBtn">Close</button>
  <iframe id="gameFrame"></iframe>
  <div id="info">Score: 0 | Level: 0</div>
</div>

<script>
const sid = "1";
let currentPage = 1;
const perPage = 24;

const gamesContainer = document.getElementById("games");
const iframe = document.getElementById("gameFrame");
const player = document.getElementById("player");
const info = document.getElementById("info");

let score = 0;
let level = 0;

/**
 * Load games page
 */
async function loadGames() {
  const url = `https://feeds.gamepix.com/v2/json?order=quality&page=${currentPage}&pagination=${perPage}&sid=${sid}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    data.items.forEach(game => {
      const card = document.createElement("div");
      card.className = "game-card";

      card.innerHTML = `
        <img src="${game.banner_image}">
        <div class="game-title">${game.title}</div>
      `;

      card.onclick = () => openGame(game.url);

      gamesContainer.appendChild(card);
    });

    currentPage++;

  } catch (err) {
    console.error(err);
  }
}

/**
 * Open game
 */
function openGame(url) {
  iframe.src = url;
  player.style.display = "flex";

  score = 0;
  level = 0;
  updateInfo();
}

/**
 * Close game
 */
document.getElementById("closeBtn").onclick = () => {
  iframe.src = "";
  player.style.display = "none";
};

/**
 * Update UI
 */
function updateInfo() {
  info.innerText = `Score: ${score} | Level: ${level}`;
}

/**
 * Listen for game events
 */
window.addEventListener("message", (e) => {
  if (!e.data) return;

  if (e.data.type === "update_score") {
    score = e.data.score;
  }

  if (e.data.type === "update_level") {
    level = e.data.level;
  }

  updateInfo();
});

/**
 * Load more button
 */
document.getElementById("loadMore").onclick = loadGames;

/**
 * Initial load
 */
loadGames();
</script>

</body>
</html>
